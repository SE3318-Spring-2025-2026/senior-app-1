openapi: 3.0.3
info:
  title: Senior Project Management System - User Registration API
  description: API specification for the backend user registration module of the Senior Project Management System. Covers student ID import, student registration validation, professor onboarding, password setup, and GitHub account linking.
  version: 1.0.0
servers:
  - url: https://api.senior-project.edu/v1
    description: Production server

tags:
  - name: Coordinator
    description: Coordinator-facing endpoints for student ID registry import.
  - name: Student
    description: Student-facing registration and GitHub linking endpoints.
  - name: Admin
    description: Admin-facing professor onboarding endpoints.
  - name: Professor
    description: Professor-facing initial password setup endpoint.
  - name: User Database
    description: Internal User Database service endpoints.
  - name: Password Setup Token Store
    description: Internal token verification endpoint.
  - name: Linked GitHub Account Store
    description: Internal GitHub link persistence endpoint.
  - name: Internal
    description: Internal service-to-service operations, not actor-facing public business screens.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    internalBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: ServiceToken

  schemas:
    ErrorResponse:
      type: object
      description: Standard error envelope for all endpoints.
      required: [message, errorCode]
      properties:
        message:
          type: string
          description: Human-readable error message.
          example: Validation failed
        errorCode:
          type: string
          description: Machine-readable error code.
          example: VALIDATION_FAILED

    GitHubLinkErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
      example:
        message: GitHub account is already linked for this student.
        errorCode: GITHUB_ACCOUNT_ALREADY_LINKED_FOR_STUDENT

    StudentIdListRequest:
      type: object
      description: List of student IDs to import into the registry.
      required: [studentIds]
      properties:
        studentIds:
          type: array
          minItems: 1
          items:
            type: string
            example: "11070001000"
      example:
        studentIds: ["11070001000", "11070001001", "11070001002"]

    StudentIdImportResult:
      type: object
      description: Summary result for student ID import or storage operations.
      required: [inserted, duplicates, invalidFormat]
      properties:
        inserted:
          type: integer
          example: 120
        duplicates:
          type: integer
          example: 3
        invalidFormat:
          type: integer
          example: 2
      example:
        inserted: 120
        duplicates: 3
        invalidFormat: 2

    StudentValidationResponse:
      type: object
      description: Validation state of a student ID in the registry.
      required: [valid, studentId, alreadyRegistered]
      properties:
        valid:
          type: boolean
          example: true
        studentId:
          type: string
          example: "11070001000"
        alreadyRegistered:
          type: boolean
          example: false
      example:
        valid: true
        studentId: "11070001000"
        alreadyRegistered: false

    StudentRegistrationValidationRequest:
      type: object
      description: Public request to validate student registration details before account creation.
      required: [studentId, email, fullName, password]
      properties:
        studentId:
          type: string
          example: "11070001000"
        email:
          type: string
          format: email
          example: student@university.edu
        fullName:
          type: string
          example: Ali Veli
        password:
          type: string
          format: password
          example: StrongPassword123!
      example:
        studentId: "11070001000"
        email: student@university.edu
        fullName: Ali Veli
        password: StrongPassword123!

    ValidationPassedResponse:
      type: object
      description: Success response returned when registration validation passes.
      required: [valid, studentId, message]
      properties:
        valid:
          type: boolean
          example: true
        studentId:
          type: string
          example: "11070001000"
        message:
          type: string
          example: Validation passed
      example:
        valid: true
        studentId: "11070001000"
        message: Validation passed

    CreateStudentAccountResponse:
      type: object
      description: Response returned when a student account is created successfully.
      required: [valid, userId, studentId, message]
      properties:
        valid:
          type: boolean
          example: true
        userId:
          type: integer
          example: 501
        studentId:
          type: string
          example: "11070001000"
        message:
          type: string
          example: Student account created successfully
      example:
        valid: true
        userId: 501
        studentId: "11070001000"
        message: Student account created successfully

    CreateStudentAccountInUserDatabaseResponse:
      type: object
      description: Internal response returned when a student account record is persisted successfully.
      required: [userId, studentId, message]
      properties:
        userId:
          type: integer
          example: 501
        studentId:
          type: string
          example: "11070001000"
        message:
          type: string
          example: Student account created successfully
      example:
        userId: 501
        studentId: "11070001000"
        message: Student account created successfully

    CreateStudentAccountInUserDatabaseRequest:
      type: object
      description: Internal request that receives validated student registration data with a hashed password and persists the new account.
      required: [studentId, email, fullName, passwordHash]
      properties:
        studentId:
          type: string
          example: "11070001000"
        email:
          type: string
          format: email
          example: student@university.edu
        fullName:
          type: string
          example: Ali Veli
        passwordHash:
          type: string
          example: hashed_password_value
      example:
        studentId: "11070001000"
        email: student@university.edu
        fullName: Ali Veli
        passwordHash: hashed_password_value

    RegisterProfessorRequest:
      type: object
      description: Admin request to register a professor base account.
      required: [email, fullName, department]
      properties:
        email:
          type: string
          format: email
          example: prof@example.edu
        fullName:
          type: string
          example: Prof. Dr. X
        department:
          type: string
          example: Software Engineering
      example:
        email: prof@example.edu
        fullName: Prof. Dr. X
        department: Software Engineering

    RegisterProfessorResponse:
      type: object
      description: Response returned after the admin registers a professor base account.
      required: [userId, professorId, message]
      properties:
        userId:
          type: integer
          example: 701
        professorId:
          type: integer
          example: 88
        message:
          type: string
          example: Professor account created. Password setup link generated.
      example:
        userId: 701
        professorId: 88
        message: Professor account created. Password setup link generated.

    CreateProfessorRecordResponse:
      type: object
      description: Internal persistence response for professor record creation.
      required: [userId, professorId, setupRequired]
      properties:
        userId:
          type: integer
          example: 701
        professorId:
          type: integer
          example: 88
        setupRequired:
          type: boolean
          example: true
      example:
        userId: 701
        professorId: 88
        setupRequired: true

    ProfessorPasswordSetupRequest:
      type: object
      description: Request for professor initial password setup.
      required: [setupToken, newPassword]
      properties:
        setupToken:
          type: string
          example: pst_xxx
        newPassword:
          type: string
          format: password
          example: NewStrongPassword123!
      example:
        setupToken: pst_xxx
        newPassword: NewStrongPassword123!

    SimpleMessageResponse:
      type: object
      description: Generic success response containing only a message.
      required: [message]
      properties:
        message:
          type: string
          example: Password set successfully
      example:
        message: Password set successfully

    VerifySetupTokenRequest:
      type: object
      description: Internal request to verify a professor setup token.
      required: [setupToken]
      properties:
        setupToken:
          type: string
          example: pst_xxx
      example:
        setupToken: pst_xxx

    VerifySetupTokenResponse:
      type: object
      description: Internal response showing whether a setup token is valid.
      required: [valid, message]
      properties:
        valid:
          type: boolean
          example: true
        professorId:
          type: integer
          example: 88
        message:
          type: string
          example: Setup token verified
      example:
        valid: true
        professorId: 88
        message: Setup token verified

    UpdateProfessorPasswordRequest:
      type: object
      description: Internal request to update professor password after token verification.
      required: [passwordHash]
      properties:
        passwordHash:
          type: string
          example: hashed_new_password_value
      example:
        passwordHash: hashed_new_password_value

    UpdateProfessorPasswordResponse:
      type: object
      description: Internal response for professor password update.
      required: [professorId, message]
      properties:
        professorId:
          type: integer
          example: 88
        message:
          type: string
          example: Professor password updated successfully
      example:
        professorId: 88
        message: Professor password updated successfully

    GitHubAuthorizationUrlResponse:
      type: object
      description: Authorization URL used to begin GitHub account linking.
      required: [authorizationUrl]
      properties:
        authorizationUrl:
          type: string
          format: uri
          example: https://github.com/login/oauth/authorize?client_id=...
      example:
        authorizationUrl: https://github.com/login/oauth/authorize?client_id=...

    GitHubCallbackVerificationResponse:
      type: object
      description: Response indicating that the GitHub callback was verified successfully and the GitHub account was linked.
      required: [callbackVerified, githubLinked, githubUsername]
      properties:
        callbackVerified:
          type: boolean
          example: true
        githubLinked:
          type: boolean
          example: true
        githubUsername:
          type: string
          example: student-gh
      example:
        callbackVerified: true
        githubLinked: true
        githubUsername: student-gh

    StoreLinkedGitHubAccountRequest:
      type: object
      description: Internal request to persist linked GitHub account information.
      required: [studentId, githubId, githubUsername]
      properties:
        studentId:
          type: integer
          example: 501
        githubId:
          type: string
          example: "12345678"
        githubUsername:
          type: string
          example: student-gh
      example:
        studentId: 501
        githubId: "12345678"
        githubUsername: student-gh

    StoreLinkedGitHubAccountResponse:
      type: object
      description: Internal response for storing a linked GitHub account.
      required: [linked, message]
      properties:
        linked:
          type: boolean
          example: true
        message:
          type: string
          example: GitHub account link stored successfully
      example:
        linked: true
        message: GitHub account link stored successfully

    UpdateStudentGitHubLinkRequest:
      type: object
      description: Internal request to mark a student account as GitHub-linked.
      required: [githubUsername, githubLinked]
      properties:
        githubUsername:
          type: string
          example: student-gh
        githubLinked:
          type: boolean
          example: true
      example:
        githubUsername: student-gh
        githubLinked: true

    UpdateStudentGitHubLinkResponse:
      type: object
      description: Internal response for updating student GitHub link state.
      required: [studentId, githubLinked, message]
      properties:
        studentId:
          type: string
          example: "11070001000"
        githubLinked:
          type: boolean
          example: true
        message:
          type: string
          example: Student GitHub link updated successfully
      example:
        studentId: "11070001000"
        githubLinked: true
        message: Student GitHub link updated successfully

paths:
  /api/v1/user-database/valid-student-ids:
    post:
      tags: ["User Database", "Internal"]
      summary: Internal - Store valid student IDs in the User Database
      description: Stores valid student IDs in the internal student registry. This endpoint supports the coordinator import flow and is not actor-facing.
      operationId: storeValidStudentIds
      security: [{ internalBearerAuth: [] }]
      requestBody:
        required: true
        description: Student IDs to persist in the valid ID registry.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentIdListRequest'
            example:
              studentIds: ["11070001000", "11070001001", "11070001002"]
      responses:
        201:
          description: Student IDs stored successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentIdImportResult'
        400:
          description: Invalid request body or malformed student IDs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Internal authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        403:
          description: Caller is not allowed to access this internal endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        422:
          description: Student ID registry request cannot be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user-database/students:
    post:
      tags: ["User Database", "Internal"]
      summary: Internal - Create student account in user database
      description: Receives validated student registration data with a hashed password and saves the new student account.
      operationId: createStudentAccountInUserDatabase
      requestBody:
        required: true
        description: Validated student registration data to persist in the user database.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStudentAccountInUserDatabaseRequest'
            example:
              studentId: "11070001000"
              email: student@university.edu
              fullName: Ali Veli
              passwordHash: hashed_password_value
      responses:
        201:
          description: Student account created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateStudentAccountInUserDatabaseResponse'
        400:
          description: Missing or malformed student account fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Internal authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        403:
          description: Caller is not allowed to access this internal endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        409:
          description: Student is already registered or email is already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user-database/students/{studentId}/validation:
    get:
      tags: ["User Database", "Internal"]
      summary: Internal - Check whether a student ID is valid and already registered
      description: Checks whether the given student ID exists in the valid registry and whether a student account already exists for it. Current implementation exposes this endpoint without a separate internal-auth layer.
      operationId: validateStudentIdInUserDatabase
      parameters:
        - name: studentId
          in: path
          required: true
          description: Student identifier to validate.
          schema: { type: string }
      responses:
        200:
          description: Validation result returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentValidationResponse'
        400:
          description: Invalid student ID format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Internal authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        403:
          description: Caller is not allowed to access this internal endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Student ID registry entry not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/coordinator/student-id-registry/import:
    post:
      tags: ["Coordinator"]
      summary: Coordinator uploads valid student IDs and receives import summary
      description: Coordinator-only endpoint used before any student registration attempt. Uploaded valid student IDs are processed and summarized for insertion, duplicates, and invalid formats.
      operationId: importValidStudentIds
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        description: List of valid student IDs uploaded by coordinator.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentIdListRequest'
            example:
              studentIds: ["11070001000", "11070001001", "11070001002"]
      responses:
        201:
          description: Student ID import completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentIdImportResult'
        400:
          description: Invalid request body or malformed student IDs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        403:
          description: Only coordinators can import valid student IDs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        422:
          description: Import request violates business validation rules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/students/registration-validation:
    post:
      tags: ["Student"]
      summary: Validate student registration details
      description: Validates student ID eligibility, alreadyRegistered state, email uniqueness, and password policy. If validation succeeds, the API returns a validation success response without creating the account.
      operationId: validateStudentRegistration
      requestBody:
        required: true
        description: Student registration details to validate.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentRegistrationValidationRequest'
            example:
              studentId: "11070001000"
              email: student@university.edu
              fullName: Ali Veli
              password: StrongPassword123!
      responses:
        200:
          description: Validation passed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationPassedResponse'
        400:
          description: Missing or malformed registration fields, or weak password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        409:
          description: Student is already registered or email is already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        403:
          description: Student ID is not eligible for registration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/students/register:
    post:
      tags: ["Student"]
      summary: Create student account
      description: Creates the student account after applying the same business validation rules used by the registration validation endpoint.
      operationId: registerStudentAccount
      requestBody:
        required: true
        description: Student registration details to create the account.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentRegistrationValidationRequest'
            example:
              studentId: "11070001000"
              email: student@university.edu
              fullName: Ali Veli
              password: StrongPassword123!
      responses:
        201:
          description: Student account created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateStudentAccountResponse'
        400:
          description: Missing or malformed registration fields, or weak password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        403:
          description: Student ID is not eligible for registration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        409:
          description: Student is already registered or email is already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/professors:
    post:
      tags: ["Admin"]
      summary: Admin registers professor base account
      description: Admin-only endpoint that creates the professor base account. Setup token generation is internal business logic and is not exposed as a separate REST endpoint.
      operationId: registerProfessorBaseAccount
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        description: Professor base account data.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterProfessorRequest'
            example:
              email: prof@example.edu
              fullName: Prof. Dr. X
              department: Software Engineering
      responses:
        201:
          description: Professor base account created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterProfessorResponse'
        400:
          description: Invalid professor registration request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        403:
          description: Only admins can register professors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        409:
          description: Professor email is already registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        422:
          description: Professor registration violates business validation rules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user-database/professors:
    post:
      tags: ["User Database", "Internal"]
      summary: Internal - Create professor record in the User Database
      description: Internal persistence endpoint used by the admin professor registration flow. This endpoint is not actor-facing.
      operationId: createProfessorRecord
      security: [{ internalBearerAuth: [] }]
      requestBody:
        required: true
        description: Professor record data to persist.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterProfessorRequest'
            example:
              email: prof@example.edu
              fullName: Prof. Dr. X
              department: Software Engineering
      responses:
        201:
          description: Professor record created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProfessorRecordResponse'
        400:
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Internal authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        403:
          description: Caller is not allowed to access this internal endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        409:
          description: Professor record already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        422:
          description: Professor record cannot be created from supplied data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/professors/password-setup:
    post:
      tags: ["Professor"]
      summary: Professor sets initial password using setup token
      description: Professor initial password setup endpoint. Does not require normal login, but requires a valid setup token in the request body.
      operationId: setupProfessorPassword
      requestBody:
        required: true
        description: Setup token and new password.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfessorPasswordSetupRequest'
            example:
              setupToken: pst_xxx
              newPassword: NewStrongPassword123!
      responses:
        200:
          description: Password set successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
        400:
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Setup token or professor record not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        422:
          description: Password setup request violates business validation rules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/password-setup-token-store/verify:
    post:
      tags: ["Password Setup Token Store", "Internal"]
      summary: Internal - Verify whether a professor setup token is valid
      description: Internal endpoint that checks whether the setup token is valid, unused, and not expired.
      operationId: verifyProfessorSetupToken
      security: [{ internalBearerAuth: [] }]
      requestBody:
        required: true
        description: Setup token to verify.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifySetupTokenRequest'
            example:
              setupToken: pst_xxx
      responses:
        200:
          description: Setup token verification result returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifySetupTokenResponse'
        400:
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Internal authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        403:
          description: Caller is not allowed to access this internal endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user-database/professors/{professorId}/password:
    patch:
      tags: ["User Database", "Internal"]
      summary: Internal - Update professor password after successful token verification
      description: Internal endpoint that updates the professor password after token verification. Accepts only passwordHash and never returns sensitive password data.
      operationId: updateProfessorPassword
      security: [{ internalBearerAuth: [] }]
      parameters:
        - name: professorId
          in: path
          required: true
          description: Professor identifier.
          schema: { type: integer }
      requestBody:
        required: true
        description: New professor password hash.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfessorPasswordRequest'
            example:
              passwordHash: hashed_new_password_value
      responses:
        200:
          description: Professor password updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateProfessorPasswordResponse'
        400:
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Internal authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        403:
          description: Caller is not allowed to access this internal endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Professor record not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        422:
          description: Password update request cannot be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/students/me/github/link:
    get:
      tags: ["Student"]
      summary: Start GitHub account linking flow for authenticated active student
      description: Authenticated active student endpoint that generates the GitHub authorization URL. Fetching GitHub profile data and completing account link persistence continue internally after callback verification. In development mode, when GitHub OAuth credentials are not configured in the backend environment, the implementation may return a local mock callback URL so the rest of the linking flow can still be exercised without the real GitHub authorize screen.
      operationId: startGitHubLinking
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Authorization URL generated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubAuthorizationUrlResponse'
        401:
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        403:
          description: Only authenticated active students can start GitHub linking.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/github/callback:
    get:
      tags: ["Student"]
      summary: Handle GitHub OAuth callback verification
      description: Validates the callback state and exchanges the authorization code for an access token internally. GitHub access tokens and client secrets are never returned in the success response. In development mode without GitHub OAuth credentials, the flow may complete through a local mock callback path.
      operationId: handleGitHubCallback
      parameters:
        - name: code
          in: query
          required: true
          description: GitHub OAuth authorization code.
          schema: { type: string }
        - name: state
          in: query
          required: true
          description: OAuth state value.
          schema: { type: string }
      responses:
        200:
          description: GitHub callback verified successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubCallbackVerificationResponse'
        400:
          description: Missing or malformed callback parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Student record not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        409:
          description: GitHub account is already linked, including duplicate relink attempts for the same student.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubLinkErrorResponse'
        422:
          description: Callback cannot be processed because of OAuth validation failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        500:
          description: Callback processing failed because of an unexpected backend error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/linked-github-account-store/links:
    post:
      tags: ["Linked GitHub Account Store", "Internal"]
      summary: Internal - Persist linked GitHub account information
      description: Internal endpoint that stores verified GitHub account data after callback handling and profile retrieval succeed. Current implementation exposes this endpoint without a separate internal-auth layer.
      operationId: storeLinkedGitHubAccount
      requestBody:
        required: true
        description: Linked GitHub account data to persist.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreLinkedGitHubAccountRequest'
            example:
              studentId: 501
              githubId: "12345678"
              githubUsername: student-gh
      responses:
        200:
          description: Linked GitHub account stored successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreLinkedGitHubAccountResponse'
        400:
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Internal authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        403:
          description: Caller is not allowed to access this internal endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        409:
          description: GitHub account link already exists, including duplicate relink attempts for the same student.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubLinkErrorResponse'
        422:
          description: GitHub link cannot be stored from supplied data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/user-database/students/{studentId}/github-link:
    patch:
      tags: ["User Database", "Internal"]
      summary: Internal - Mark a student account as GitHub-linked
      description: Internal endpoint that updates the student record after the GitHub account link is verified and persisted. Current implementation exposes this endpoint without a separate internal-auth layer.
      operationId: updateStudentGitHubLink
      parameters:
        - name: studentId
          in: path
          required: true
          description: Student user identifier.
          schema: { type: integer }
      requestBody:
        required: true
        description: GitHub link state to persist in the student record.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStudentGitHubLinkRequest'
            example:
              githubUsername: student-gh
              githubLinked: true
      responses:
        200:
          description: Student GitHub link updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateStudentGitHubLinkResponse'
        400:
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Internal authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        403:
          description: Caller is not allowed to access this internal endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Student record not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        422:
          description: GitHub link update cannot be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
