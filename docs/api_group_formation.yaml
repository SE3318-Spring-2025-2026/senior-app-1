openapi: 3.0.3
info:
  title: Senior Project Management System - Group Formation API
  description: API specification for Process 2.0 Group Formation, based on Level 2 DFD. Includes detailed payload contracts and common error shapes to simplify implementation.
  version: 1.0.1
servers:
  - url: https://api.senior-project.edu/v1
    description: Production server

tags:
  - name: 2.0 Group Formation
    description: Operations for creating groups, inviting members, and initial advisor requests.

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token

  schemas:
    Group:
      type: object
      description: Student project group shell used across formation and advisor flows.
      required: [id, name, leaderId, memberIds]
      properties:
        id:
          type: string
          description: Opaque group identifier (UUID or ULID).
          example: grp_123e4567-e89b-12d3-a456-426614174000
        name:
          type: string
          description: Human-friendly group name.
          example: AI Capstone Team
        leaderId:
          type: string
          description: Student ID of the designated group leader.
          example: stu_leader_01
        memberIds:
          type: array
          description: All confirmed members; should include the leader after finalize.
          items:
            type: string
            example: stu_member_02
        advisorId:
          type: string
          nullable: true
          description: Assigned advisor ID when approved; null until confirmed.
          example: prof_88

    Invitation:
      type: object
      description: Invitation sent from a leader to a prospective member.
      required: [id, groupId, studentId, status]
      properties:
        id:
          type: string
          description: Invitation identifier.
          example: inv_01H9Z8YJV7M0CKS0Q9K3
        groupId:
          type: string
          description: Target group ID.
          example: grp_123e4567-e89b-12d3-a456-426614174000
        studentId:
          type: string
          description: Invitee student ID.
          example: stu_member_03
        status:
          type: string
          description: Current invitation status.
          enum: [PENDING, ACCEPTED, REJECTED]
          example: PENDING

    AdvisorRequest:
      type: object
      description: Request from a leader to a professor to become the group advisor.
      required: [id, groupId, professorId, status]
      properties:
        id:
          type: string
          description: Advisor request identifier.
          example: adr_01HB1AV8Y7BR9H2D5S8G
        groupId:
          type: string
          description: Group requesting the advisor.
          example: grp_123e4567-e89b-12d3-a456-426614174000
        professorId:
          type: string
          description: Target professor ID.
          example: prof_88
        status:
          type: string
          description: Current request status.
          enum: [PENDING, APPROVED, REJECTED]
          example: PENDING

    Error:
      type: object
      description: Standard error envelope.
      required: [message]
      properties:
        message:
          type: string
          description: Human-friendly error message.
          example: Group not found
        code:
          type: string
          description: Machine-friendly error code for programmatic handling.
          example: GROUP_NOT_FOUND

paths:
  /groups:
    post:
      tags: ["2.0 Group Formation"]
      summary: Create a new group shell (Process 2.1)
      description: Creates an empty group record with the caller as leader; no members are added yet.
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        description: Name of the group to be created.
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: Human-friendly group name; must be unique per cohort.
                  example: AI Capstone Team
      responses:
        201:
          description: Group created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        400:
          description: Invalid payload (e.g., missing name or duplicate name).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        401:
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /groups/{groupId}/invitations:
    post:
      tags: ["2.0 Group Formation"]
      summary: Dispatch invitations to students (Process 2.2)
      description: Leader sends invitations to one or more students to join the group.
      security: [{ cookieAuth: [] }]
      parameters:
        - name: groupId
          in: path
          required: true
          description: Group that is inviting members.
          schema: { type: string }
      requestBody:
        required: true
        description: List of student IDs to invite.
        content:
          application/json:
            schema:
              type: object
              required: [studentIds]
              properties:
                studentIds:
                  type: array
                  description: One or more student IDs to invite.
                  minItems: 1
                  items: { type: string, example: stu_member_02 }
            example:
              studentIds: [stu_member_02, stu_member_03]
      responses:
        201:
          description: Invitations dispatched.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invitation'
        400:
          description: Invalid request (e.g., empty list or duplicates).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        401:
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Group not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /invitations/{invitationId}/response:
    patch:
      tags: ["2.0 Group Formation"]
      summary: Process invitee response (Process 2.3)
      description: Student accepts or rejects a group invitation.
      security: [{ cookieAuth: [] }]
      parameters:
        - name: invitationId
          in: path
          required: true
          description: Invitation to respond to.
          schema: { type: string }
      requestBody:
        required: true
        description: Invitee response.
        content:
          application/json:
            schema:
              type: object
              required: [response]
              properties:
                response:
                  type: string
                  description: Action by invitee.
                  enum: [ACCEPT, REJECT]
                  example: ACCEPT
      responses:
        200:
          description: Response processed; invitation status updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        400:
          description: Invalid state transition (e.g., already responded).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        401:
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Invitation not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /groups/{groupId}/membership/finalize:
    post:
      tags: ["2.0 Group Formation"]
      summary: Finalize group membership (Process 2.4)
      description: Confirms accepted members, updates the group roster, and notifies the leader.
      security: [{ cookieAuth: [] }]
      parameters:
        - name: groupId
          in: path
          required: true
          description: Group whose membership is being finalized.
          schema: { type: string }
      responses:
        200:
          description: Membership finalized; group now contains accepted members.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        400:
          description: Cannot finalize (e.g., no accepted invitations or already finalized).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        401:
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Group not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /groups/{groupId}/advisor-request:
    post:
      tags: ["2.0 Group Formation"]
      summary: Manage advisor request (Process 2.5)
      description: Leader requests a professor to be the group advisor.
      security: [{ cookieAuth: [] }]
      parameters:
        - name: groupId
          in: path
          required: true
          description: Group requesting an advisor.
          schema: { type: string }
      requestBody:
        required: true
        description: Target professor to request.
        content:
          application/json:
            schema:
              type: object
              required: [professorId]
              properties:
                professorId:
                  type: string
                  description: Professor to request as advisor.
                  example: prof_88
      responses:
        201:
          description: Request submitted to the professor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdvisorRequest'
        400:
          description: Invalid request (e.g., duplicate pending request).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        401:
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Group or professor not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /advisor/requests/{requestId}/response:
    patch:
      tags: ["2.0 Group Formation"]
      summary: Advisor response to request (Process 2.5)
      description: Advisor accepts or rejects the group request.
      security: [{ cookieAuth: [] }]
      parameters:
        - name: requestId
          in: path
          required: true
          description: Advisor request identifier.
          schema: { type: string }
      requestBody:
        required: true
        description: Advisor decision for the request.
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  description: Advisor action for the request.
                  enum: [APPROVE, REJECT]
                  example: APPROVE
      responses:
        200:
          description: Request resolved and group updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdvisorRequest'
        400:
          description: Invalid state transition (e.g., already resolved).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        401:
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Advisor request not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
